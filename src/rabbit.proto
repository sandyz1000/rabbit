syntax = "proto3";
package rabbit;

service Rabbit {
  // Tunnel client calls once; bidirectional stream carries all tunnel traffic.
  // Named Tunnel (not Connect) to avoid name collision with tonic's transport connect() method.
  rpc Tunnel(stream TunnelMessage) returns (stream TunnelMessage);

  // Service discovery — replaces GET /services?name=
  rpc ListServices(ListServicesRequest) returns (ListServicesResponse);
  rpc GetPorts(GetPortsRequest)         returns (GetPortsResponse);
}

message TunnelMessage {
  oneof payload {
    Hello          hello          = 1;
    InboundRequest request        = 2;
    ResponseMeta   response_meta  = 3;
    ResponseChunk  response_chunk = 4;
    ResponseEnd    response_end   = 5;
    Heartbeat      heartbeat      = 6;
    ErrorFrame     error          = 7;
  }
}

message Hello      { uint32 port = 1; }
message Heartbeat  {}
message ErrorFrame { string message = 1; }

message InboundRequest {
  string              id      = 1;
  string              method  = 2;
  string              path    = 3;
  string              query   = 4;
  map<string, string> headers = 5;
  bytes               body    = 6;
}

message ResponseMeta  { string id = 1; uint32 status = 2; map<string, string> headers = 3; }
message ResponseChunk { string id = 1; bytes  data   = 2; }
message ResponseEnd   { string id = 1; }

// Auth fields on all service discovery calls (same HMAC proof as tunnel connect).
message ListServicesRequest  { uint64 ts = 1; string auth = 2; }
message ServiceEntry         { string service = 1; uint32 port = 2; uint64 connected_at = 3; }
message ListServicesResponse { repeated ServiceEntry services = 1; }

message GetPortsRequest  { string name = 1; uint64 ts = 2; string auth = 3; }
message GetPortsResponse { repeated uint32 ports = 1; }
