app = "rabbit-tunnel"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  RABBIT_TUNNEL_PORT = "8081"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [services.concurrency]
    type = "requests"
    hard_limit = 500
    soft_limit = 200

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["http", "tls"]

  [services.http_checks]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

# Tunnel port — agents connect here with their id prefix
[[services]]
  internal_port = 8081
  protocol = "tcp"

  [[services.ports]]
    port = 8081
